<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>支持計畫 - 讓石滬再現</title>
  
  <link rel="icon" href="images/favicon.png" type="image/png">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&display=swap" rel="stylesheet">

  <style>
    :root { 
      --brand: #9a382b; 
      --line: #e8dfd3; 
    }

    body { 
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
      margin: 0; 
      background-image: url('images/捐款連結背景.jpg'); 
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      min-height: 100vh;
      color: #333;
    }
    
    /* 導覽列 */
    .topbar { 
      position: sticky; 
      top: 0; 
      background: rgba(255, 255, 255, 0.85); 
      backdrop-filter: blur(10px); 
      border-bottom: 1px solid var(--line); 
      z-index: 100; 
      padding: 10px 0; 
    }
    .nav { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; max-width: 1200px; margin: auto; }
    .nav-btn { padding: 8px 12px; background: rgba(255, 255, 255, 0.5); border: 1px solid var(--line); border-radius: 4px; text-decoration: none; color: #4b5563; font-weight: bold; font-size: 13px; transition: 0.3s; }
    .nav-btn:hover, .nav-btn.active { background: var(--brand); color: white; border-color: var(--brand); }
    
    /* 內容容器 */
    .container { 
      max-width: 800px; 
      margin: 40px auto; 
      background: rgba(255, 255, 255, 0.3); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px);
      padding: 40px; 
      border-radius: 30px; 
      text-align: center; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.2); 
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    h1 { font-family: 'Ma Shan Zheng', cursive; font-size: 3.2rem; color: var(--brand); margin-top: 0; margin-bottom: 25px; }

    /* 圖片插槽區 */
    .promo-box {
      width: 100%;
      background: #fff;
      border-radius: 20px;
      overflow: hidden;
      border: 8px solid white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      margin-bottom: 35px;
    }

    .promo-box img {
      width: 100%;
      height: auto;
      display: block;
      transition: 0.5s ease;
    }

    .promo-box:hover img {
      transform: scale(1.03);
    }

    /* 立即捐款大按鈕 */
    .donate-action-btn {
      display: inline-block;
      width: 90%;
      max-width: 450px;
      padding: 22px;
      background: var(--brand);
      color: white !important;
      text-decoration: none;
      font-size: 1.6rem;
      font-weight: bold;
      border-radius: 100px;
      box-shadow: 0 10px 25px rgba(154, 56, 43, 0.4);
      transition: 0.4s;
      border: none;
      cursor: pointer;
    }

    .donate-action-btn:hover {
      background: #7a2c22;
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(154, 56, 43, 0.5);
    }

    .footer-note {
      margin-top: 30px;
      font-size: 0.95rem;
      color: #fa0707;
      font-weight: bold;
    }

    footer { text-align: center; padding: 40px; color: #fff; font-size: 0.9rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
  </style>
</head>
<body>

  <header class="topbar">
    <nav class="nav">
      <a href="index.html" class="nav-btn">首頁</a>
      <a href="team.html" class="nav-btn">隊員</a>
      <a href="idea.html" class="nav-btn">核心想法</a>
      <a href="永續傳承.html" class="nav-btn">永續傳承</a>
      <a href="商品.html" class="nav-btn">商品</a>
      <a href="三代合照.html" class="nav-btn">三代合照</a>
      <a href="money.html" class="nav-btn">資金應用</a>
      <a href="捐款連結.html" class="nav-btn active">捐款連結</a>
    </nav>
  </header>

  <main class="container">
    <h1>聚沙成塔，守護石滬</h1>
    
    <div class="promo-box">
      <img src="images/付款圖.png" alt="付款圖">
    </div>

    <a href="https://www.oldpeople.org.tw/pop/feature/donation" target="_blank" class="donate-action-btn">
      前往支持計畫 →
    </a>

    <h3 class="footer-note">
      ※ 點擊按鈕將開啟新頁面跳轉至捐款平台。
    </h3>
  </main>

  <footer>© 2026 讓石滬再現 計畫團隊</footer>

</body>
</html>
