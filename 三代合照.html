<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>三代大合照 - 讓石滬再現</title>
  <style>
    :root{ 
      --brand:#9a382b; 
      --bg-start:#e9a315; 
      --bg-end:#1bade6;   
      --line:#e8dfd3; 
    }

    body { 
      font-family: sans-serif; 
      margin: 0; 
      line-height: 1.8; 
      background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
      background-attachment: fixed; 
      min-height: 100vh;
    }
    
    .topbar { 
      position: sticky; 
      top: 0; 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(10px); 
      border-bottom: 1px solid var(--line); 
      z-index: 100; 
      padding: 10px 0; 
    }
    .nav { display:flex; justify-content:center; gap:8px; flex-wrap:wrap; max-width:1200px; margin:auto; }
    .nav-btn { padding:8px 12px; background:rgba(255, 255, 255, 0.5); border:1px solid var(--line); border-radius:4px; text-decoration:none; color:#4b5563; font-weight:bold; font-size:13px; transition:0.3s; }
    .nav-btn:hover, .nav-btn.active { background:var(--brand); color:white; border-color:var(--brand); }
    
    .container { 
      max-width:900px; 
      margin:40px auto; 
      background: rgba(255, 255, 255, 0.7); 
      backdrop-filter: blur(10px);
      padding:40px; 
      border-radius:30px; 
      text-align:center; 
      box-shadow: 0 20px 50px rgba(0,0,0,0.1); 
    }
    
    .back-home { display:inline-block; margin-bottom:20px; padding:10px 20px; background:var(--brand); color:white; text-decoration:none; border-radius:6px; font-weight:bold; float:left; transition: 0.3s; }
    .back-home:hover { background: #7a2c22; transform: translateX(-5px); }

    /* --- 輪播圖樣式 --- */
    .slideshow-container {
      position: relative;
      max-width: 100%;
      margin: 40px auto;
      background: white;
      padding: 10px;
      border-radius: 20px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* 隱藏所有圖片 */
    .mySlides {
      display: none;
      animation: fade 0.2s; /* 淡入動畫 */
    }

    .mySlides img {
      width: 100%;
      height: auto;
      border-radius: 15px;
      display: block;
    }

    /* 前進與後退按鈕 */
    .prev, .next {
      cursor: pointer;
      position: absolute;
      top: 50%;
      width: auto;
      margin-top: -22px;
      padding: 16px;
      color: white;
      font-weight: bold;
      font-size: 24px;
      transition: 0.6s ease;
      border-radius: 0 3px 3px 0;
      user-select: none;
      background-color: rgba(0,0,0,0.3);
      text-decoration: none;
    }
    .prev { left: 10px; border-radius: 50%; }
    .next { right: 10px; border-radius: 50%; }
    .prev:hover, .next:hover { background-color: var(--brand); }

    /* 文字標題 */
    .text-overlay {
      color: #333;
      font-size: 1.2rem;
      padding: 15px 0;
      font-weight: bold;
      color: var(--brand);
    }

    /* 淡入動畫關鍵幀 */
    @keyframes fade {
      from {opacity: .4} 
      to {opacity: 1}
    }

    /* 指示點 (dots) */
    .dot-container { margin-top: 15px; }
    .dot {
      cursor: pointer;
      height: 12px;
      width: 12px;
      margin: 0 5px;
      background-color: #bbb;
      border-radius: 50%;
      display: inline-block;
      transition: background-color 0.6s ease;
    }
    .active-dot, .dot:hover { background-color: var(--brand); }

  </style>
</head>
<body>
  <header class="topbar">
    <nav class="nav">
      <a href="index.html" class="nav-btn">首頁</a>
      <a href="team.html" class="nav-btn">隊員</a>
      <a href="idea.html" class="nav-btn">核心想法</a>
      <a href="永續傳承.html" class="nav-btn">永續傳承</a>
      <a href="商品.html" class="nav-btn">商品</a>
      <a href="三代合照.html" class="nav-btn active">三代合照</a>
      <a href="money.html" class="nav-btn">資金應用</a>
      <a href="捐款連結.html" class="nav-btn">捐款連結</a>
    </nav>
  </header>

  <main class="container">
    <a href="index.html" class="back-home">← 返回主頁</a>
    <div style="clear:both;"></div>
    
    <h1 style="color:var(--brand); font-size: 2.2rem;">世代連結的瞬間</h1>
    <p>透過鏡頭紀錄三代在石滬海岸共同協作的珍貴畫面。</p>
    
    <div class="slideshow-container">
      
      <div class="mySlides">
        <img src="images/合照1.jpg">
        <div class="text-overlay">石滬再現，情感連結</div>
      </div>

      <div class="mySlides">
        <img src="images/合照2.jpg">
        <div class="text-overlay">青銀共創，傳承智慧</div>
      </div>

      <div class="mySlides">
        <img src="images/合照3.jpg">
        <div class="text-overlay">守護新豐海岸的記憶</div>
      </div>

      <a class="prev" onclick="plusSlides(-1)">&#10094;</a>
      <a class="next" onclick="plusSlides(1)">&#10095;</a>
    </div>

    <div class="dot-container">
      <span class="dot" onclick="currentSlide(1)"></span> 
      <span class="dot" onclick="currentSlide(2)"></span> 
      <span class="dot" onclick="currentSlide(3)"></span> 
    </div>

    <div style="font-style:italic; color:#666; margin-top:30px; background: rgba(154, 56, 43, 0.05); padding: 15px; border-radius: 10px;">
      「讓長者再現笑容，讓文化重拾尊嚴。」
    </div>
  </main>

  <footer style="text-align: center; padding: 20px; color: #666; font-size: 0.8rem;">
    © 2026 讓石滬再現 計畫團隊
  </footer>

  <script>
    let slideIndex = 1;
    showSlides(slideIndex);

    // 下一張/上一張 控制
    function plusSlides(n) {
      showSlides(slideIndex += n);
    }

    // 當前圖片控制
    function currentSlide(n) {
      showSlides(slideIndex = n);
    }

    function showSlides(n) {
      let i;
      let slides = document.getElementsByClassName("mySlides");
      let dots = document.getElementsByClassName("dot");
      if (n > slides.length) {slideIndex = 1}    
      if (n < 1) {slideIndex = slides.length}
      for (i = 0; i < slides.length; i++) {
        slides[i].style.display = "none";  
      }
      for (i = 0; i < dots.length; i++) {
        dots[i].className = dots[i].className.replace(" active-dot", "");
      }
      slides[slideIndex-1].style.display = "block";  
      dots[slideIndex-1].className += " active-dot";
    }

    // 自動輪播 (每 5 秒切換一次)
    setInterval(function() {
      plusSlides(1);
    }, 2500);
  </script>
</body>
</html>
